<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style2.css">
    <title>Payment page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
  </head>
  <body>
    <form action="action">
      <h1>Payment</h1>
      <label for="name">Payer Name</label><br>
      <input class="box1" type="text" name="Name" id="name" placeholder="John Jonshon"><br>
      <label for="Pemail">Email</label><br>
      <input class="box1" type="email" name="email" id="email" placeholder="john@example.com"><br>
      <label for="cardnumber">Card Number</label><br>
      <input class="box1" type="number" name="number" id="number" placeholder="1111-1111-1111-1111"><br>
      <div class="div1">
        <label for="cardex">Card expiry month</label><br>
        <input class="box2" type="month" name="month" id="month" placeholder="MM"><br>
      </div>
      <div class="div1">
        <label for="cardyear">Card expiry year</label><br>
        <input class="box2" type="year" name="year" id="year" placeholder="YYYY"><br>
      </div>
      <div class="div1">
        <label for="cardCVC">Card CVC</label><br>
        <input class="box2" type="cvc" name="cvc" id="cvc" placeholder="cvc"><br>
      </div>
      <button type="button" name="button" class="btn"><a href="index.html">Pay Now</a></button>
      <button type="button" name="button" class="btn"><a href="flavours.html">Close</a></button>
    </form>
  </body>
</html>
