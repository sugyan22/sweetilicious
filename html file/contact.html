<!DOCTYPE html>

  <body>
    <section class="text-gray-600 body-font relative">

      <script>
        function initMap(){
          var location= {lat:27.712020,lng:85.312950};
          var map= new google.maps.Map(document.getElementById("map"),{
            zoom: 4,
            center: location
          });
          var marker= new google.maps.Marker({
            position: location,
            map:map
          });
        }
      </script>
      <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6uaTyyA2T81Stl_lYDKqrNAUiXUmC00k&callback=initMap">

      </script>
      <div class="bg-white relative flex flex-wrap py-6 rounded shadow-md">
        <div class="lg:w-1/2 px-6">
          <center><font size="5" color="white">ADDRESS</font>
          <font color="white"><p class="mt-1">Samakhushi,Gongabu,Kathmandu,Nepal.</p><br></font></center>
        </div>
        <div class="lg:w-1/2 px-6 mt-4 lg:mt-0">
          <center><font size="5" color="white">EMAIL</font><br>
          <font color="white"><p>grishmasa@gmail.com</p><br></font></center>
          <center><font size="5" color="white">PHONE</font>
          <font color="white"><p>+977-9862250503</p><br><br></font></center>
        </div>
      </div>

    <div class="lg:w-1/3 md:w-1/2 bg-white flex flex-col md:ml-auto w-full md:py-8 mt-8 md:mt-0">

</section>
